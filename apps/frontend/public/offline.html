<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniERP Offline</title>
    <meta name="theme-color" content="#0e7490" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Helvetica Neue",
          "Segoe UI",
          sans-serif;
        --bg: #f4f8fc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --primary: #0e7490;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(900px 400px at -10% -20%, #dbeafe, transparent 70%),
          radial-gradient(800px 300px at 110% -20%, #e0f2fe, transparent 70%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(540px, calc(100% - 2rem));
        border-radius: 24px;
        background: color-mix(in hsl, var(--card) 82%, #ffffff);
        border: 1px solid #dbe3ee;
        padding: 2rem;
        box-shadow: 0 20px 48px -28px rgb(15 23 42 / 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--primary);
      }

      .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 9999px;
        background: var(--primary);
      }

      .actions {
        margin-top: 1.5rem;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #f8fafc;
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1;
        padding: 0.7rem 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="pill"><span class="dot"></span>MiniERP</div>
      <h1>You are offline</h1>
      <p>
        The network is unavailable right now. Cached parts of the app are still
        available and you can retry once connectivity returns.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Try again</button>
      </div>
    </main>
  </body>
</html>
