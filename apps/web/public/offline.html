<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f1f5f9;
        color: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        padding: 16px;
      }
      .card {
        width: min(480px, 100%);
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
      p + p {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>The app cannot refresh this page without a network connection.</p>
      <p>Reconnect to the internet and refresh to continue.</p>
    </main>
  </body>
</html>
