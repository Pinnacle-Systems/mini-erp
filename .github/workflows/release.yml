name: Release to VPS

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Application build
        run: pnpm install --frozen-lockfile && pnpm --filter backend prisma:generate && pnpm build

      - name: Deploy workspace metadata to VPS
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-az --stats"
          SOURCE: package.json pnpm-lock.yaml pnpm-workspace.yaml
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.REMOTE_TARGET }}/
          SCRIPT_BEFORE: |
            mkdir -p ${{ secrets.REMOTE_TARGET }}/apps/backend
            mkdir -p ${{ secrets.REMOTE_TARGET }}/apps/frontend

      - name: Deploy backend to VPS
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-az --delete --stats"
          SOURCE: apps/backend/package.json apps/backend/prisma apps/backend/dist/
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.REMOTE_TARGET }}/apps/backend/
          SCRIPT_AFTER: |
            . ~/.nvm/nvm.sh
            nvm install 24
            nvm use 24
            corepack enable

            export NODE_ENV=production
            export JWT_SECRET=${{secrets.JWT_SECRET}}
            export DATABASE_URL=postgres://${{secrets.DB_APP_USER}}:${{secrets.DB_APP_USER_PASSWD}}@${{secrets.DB_HOST}}:${{secrets.DB_PORT}}/${{secrets.DB_NAME}}
            export CORS_ORIGIN=https://billing.pinnaclesystems.co.in
            export DEFAULT_BUSINESS_OWNER_PASSWORD=${{ secrets.DEFAULT_BUSINESS_OWNER_PASSWORD }}
            export PORT=9890

            cd ${{ secrets.REMOTE_TARGET }}
            pnpm install --prod --frozen-lockfile --filter backend...
            pnpm --dir apps/backend exec prisma migrate deploy --config prisma.config.js

            pm2 reload mini-erp-backend --update-env || pm2 start apps/backend/server.js --name mini-erp-backend

      - name: Deploy frontend to VPS
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-az --delete --stats"
          SOURCE: apps/frontend/dist/
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.REMOTE_TARGET }}/apps/frontend/
